name: Versioning

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'version.json'

concurrency:
  group: versioning
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Increment patch version
        run: |
          VERSION=$(jq -r '.version' version.json)

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH + 1))

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"

          jq --arg v "$NEW_VERSION" '.version = $v' version.json > tmp.json && mv tmp.json version.json

          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: version/bump-${{ env.NEW_VERSION }}
          commit-message: "chore: bump version to ${{ env.NEW_VERSION }}"
          title: "chore: bump version to ${{ env.NEW_VERSION }}"
          body: "Automated version bump"
          base: main
